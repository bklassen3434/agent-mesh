      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  bluesky-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.bluesky_scout"]
