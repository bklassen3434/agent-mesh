[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mesh-db"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "duckdb>=0.10",
    "psycopg[binary]>=3.1",
    "psycopg-pool>=3.2",
    "pytz>=2023.3",
    "mesh-models",
]

[tool.uv.sources]
mesh-models = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mesh_db"]
