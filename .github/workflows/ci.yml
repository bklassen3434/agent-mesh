name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Test
        run: uv run pytest -v

  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/wiki/package-lock.json

      - name: Install wiki dependencies
        working-directory: apps/wiki
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: apps/wiki
        run: npm run lint

      - name: Typecheck
        working-directory: apps/wiki
        run: npm run typecheck

      - name: Build
        working-directory: apps/wiki
        run: npm run build

      # Drift guard: boot the API, regenerate types, fail if the checked-in
      # file is out of date. Keeps the OpenAPI -> TypeScript pipeline honest.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install API
        run: uv sync

      - name: Start API and regenerate types
        run: |
          mkdir -p ./data
          uv run mesh-api &
          API_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz > /dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:8000/healthz > /dev/null; then
            echo "API failed to start"
            kill $API_PID || true
            exit 1
          fi
          (cd apps/wiki && npm run generate-types)
          kill $API_PID || true
        env:
          MESH_DB_PATH: ./data/mesh-ci.db
          API_HOST: 127.0.0.1
          API_PORT: "8000"

      - name: Check types are up to date
        run: |
          if ! git diff --exit-code apps/wiki/src/lib/api-types.ts; then
            echo "::error::apps/wiki/src/lib/api-types.ts is stale — run \`make types\`."
            exit 1
          fi

  # Wiki E2E. Runs after the wiki job (which covers lint + typecheck + build).
  # Playwright boots a mock API server and a production wiki build itself —
  # see apps/wiki/playwright.config.ts — so no docker-compose stack is needed.
  playwright:
    needs: [wiki]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/wiki/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/wiki

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/wiki

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: apps/wiki

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/wiki/playwright-report/
          retention-days: 7
