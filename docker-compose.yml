# Pin the project name so `docker compose` stays attached to the same stack
# even if this file moves to a directory with a different basename. Without
# this, moving the repo from `agent-mesh/` to `agent_mesh/` would orphan the
# running containers.
name: agent-mesh

services:
  arxiv-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.arxiv_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8001"
      AGENT_PUBLIC_URL: "http://arxiv-scout:8001"
    env_file:
      - .env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  hn-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.hn_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8005"
      AGENT_PUBLIC_URL: "http://hn-scout:8005"
      MESH_HN_KEYWORDS: ${MESH_HN_KEYWORDS:-AI,LLM,GPT,Claude,robotics,RAG,agent}
    env_file:
