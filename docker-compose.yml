# Pin the project name so `docker compose` stays attached to the same stack
# even if this file moves to a directory with a different basename. Without
# this, moving the repo from `agent-mesh/` to `agent_mesh/` would orphan the
# running containers.
name: agent-mesh

# ─────────────────────────────────────────────────────────────────────────────
# The live stack. The deterministic controller (`mesh-controller --forever`) is
# the SOLE orchestrator and runs every skill in-process — so the old A2A agent
# servers (scouts, claim-extractor, entity-tracker, sota-tracker, curator,
# skeptic) and the legacy `scheduler` are gone; the controller needs only
# Postgres + an LLM key. What remains:
#
#   mesh-postgres   the single Postgres knowledge + operational store (pgvector)
#   controller      the always-on self-driving orchestrator (no cron/scheduler)
#   api             the read API on :8000
#   wiki            the Next.js wiki on :3000
#   research-qa     backs the wiki Ask box + Telegram chat (POST /api/v1/ask)
#   personalizer    backs the daily brief
#   telegram-bot    the Telegram bridge (chat + daily brief)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── single Postgres for the whole stack: the knowledge store (`knowledge`
  # schema, pgvector) plus the operational tables (LangGraph checkpoints + the
  # `schedules` table in `public`). ──────────────────────────────────────────
  mesh-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: langgraph
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: ${LANGGRAPH_POSTGRES_PASSWORD:-langgraph}
    volumes:
      - mesh_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── the orchestrator ───────────────────────────────────────────────────────
  controller:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    # The deterministic controller is the sole orchestrator AND its own driver:
    # `--forever` makes it self-driving (sense → plan via rules → dispatch skills
    # → apply, looping; idle backoff between empty passes). No external
    # scheduler/cron. It dispatches skills in-process (no A2A), so it needs only
    # Postgres + an LLM key — not the agent stack. Default-on, always restarts.
    entrypoint: ["uv", "run", "mesh-controller", "--apply", "--forever"]
    environment:
      # Owner DSN applies the schema + roles on startup; the controller's
      # knowledge writes go through the writer role.
      MESH_PG_URL: "postgresql://langgraph:${LANGGRAPH_POSTGRES_PASSWORD:-langgraph}@mesh-postgres:5432/langgraph"
      MESH_PG_WRITER_URL: "postgresql://mesh_writer:${MESH_WRITER_PASSWORD:-mesh_writer}@mesh-postgres:5432/langgraph"
      MESH_WRITER_PASSWORD: ${MESH_WRITER_PASSWORD:-mesh_writer}
      MESH_READER_PASSWORD: ${MESH_READER_PASSWORD:-mesh_reader}
      LANGGRAPH_POSTGRES_URL: "postgresql://langgraph:${LANGGRAPH_POSTGRES_PASSWORD:-langgraph}@mesh-postgres:5432/langgraph"
    env_file:
      - .env
    depends_on:
      mesh-postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── the read API ─────────────────────────────────────────────────────────--
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      # Owner DSN, used once at startup to apply the schema + roles (best-effort;
      # CREATE EXTENSION/ROLE need owner privileges). Request handling uses the
      # read-only role.
      MESH_PG_URL: "postgresql://langgraph:${LANGGRAPH_POSTGRES_PASSWORD:-langgraph}@mesh-postgres:5432/langgraph"
      MESH_PG_READER_URL: "postgresql://mesh_reader:${MESH_READER_PASSWORD:-mesh_reader}@mesh-postgres:5432/langgraph"
      MESH_WRITER_PASSWORD: ${MESH_WRITER_PASSWORD:-mesh_writer}
      MESH_READER_PASSWORD: ${MESH_READER_PASSWORD:-mesh_reader}
      # MESH_BIND_INTERFACE wins over API_HOST when set. For Tailscale-only
      # access, set MESH_BIND_INTERFACE in .env to the host's tailnet IP
      # (100.x.x.x) and run this service in host network mode (docs/deployment.md).
      MESH_BIND_INTERFACE: ${MESH_BIND_INTERFACE:-}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_CORS_ORIGINS: "http://localhost:3000"
      # LangGraph checkpoints + the `schedules` table live in the same Postgres
      # (the `public` schema); the status/Pipelines pages read them here.
      LANGGRAPH_POSTGRES_URL: "postgresql://langgraph:${LANGGRAPH_POSTGRES_PASSWORD:-langgraph}@mesh-postgres:5432/langgraph"
      # Where to reach the ResearchQA agent for POST /api/v1/ask. Degrades to a
      # clean "unavailable" answer if it's down.
      MESH_ASK_AGENT_URLS: "http://research-qa:8016"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mesh-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── the wiki ─────────────────────────────────────────────────────────────--
  wiki:
    build:
      context: .
      dockerfile: Dockerfile.wiki
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      INTERNAL_API_URL: "http://api:8000"
      # HOSTNAME is the Next.js standalone bind address; default 0.0.0.0 in the
      # Dockerfile. Override with MESH_BIND_INTERFACE for Tailscale-only access.
      HOSTNAME: ${MESH_BIND_INTERFACE:-0.0.0.0}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      # Force IPv4 — Next.js standalone binds IPv4 only and BusyBox wget
      # would otherwise hit ::1 first via "localhost".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── grounded Q&A: backs the wiki Ask box + Telegram chat (POST /api/v1/ask) ─
  research-qa:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.research_qa"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8016"
      AGENT_PUBLIC_URL: "http://research-qa:8016"
      MESH_LLM_PROVIDER: ${MESH_LLM_PROVIDER:-anthropic}
      # Grounded Q&A is a synthesis task; it opts into tiered routing
      # (make_routed_llm_client) so hard questions escalate to the strong tier.
      # Routing ships off by default — set MESH_ROUTE_RESEARCH_QA_ENABLED=true
      # to turn it on, or pin MESH_LLM_MODEL_RESEARCH_QA to a fixed model.
      MESH_ROUTE_ENABLED: ${MESH_ROUTE_ENABLED:-}
      MESH_ROUTE_RESEARCH_QA_ENABLED: ${MESH_ROUTE_RESEARCH_QA_ENABLED:-}
      MESH_LLM_MODEL_RESEARCH_QA: ${MESH_LLM_MODEL_RESEARCH_QA:-}
      MESH_LLM_MODEL_RESEARCH_QA_STRONG: ${MESH_LLM_MODEL_RESEARCH_QA_STRONG:-claude-sonnet-4-6}
      MESH_ROUTE_STRONG_MODEL: ${MESH_ROUTE_STRONG_MODEL:-}
      MESH_LLM_MODEL_DEFAULT: ${MESH_LLM_MODEL_DEFAULT:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      # Read-only mesh access (mesh_reader role): the agent retrieves the
      # field-scoped context pack itself. Never writes.
      MESH_PG_READER_URL: "postgresql://mesh_reader:${MESH_READER_PASSWORD:-mesh_reader}@mesh-postgres:5432/langgraph"
    env_file:
      - .env
    ports:
      - "8016:8016"
    depends_on:
      mesh-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8016/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── personalizer: backs the daily brief ────────────────────────────────────
  personalizer:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.personalizer"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8013"
      AGENT_PUBLIC_URL: "http://personalizer:8013"
      MESH_LLM_PROVIDER: ${MESH_LLM_PROVIDER:-anthropic}
      # Sonnet is the recommended default for the briefing pass; falls back to
      # MESH_LLM_MODEL_DEFAULT then provider default if unset.
      MESH_LLM_MODEL_PERSONALIZER: ${MESH_LLM_MODEL_PERSONALIZER:-claude-sonnet-4-6}
      MESH_LLM_MODEL_DEFAULT: ${MESH_LLM_MODEL_DEFAULT:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    env_file:
      - .env
    ports:
      - "8013:8013"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Telegram bridge — chat with the mesh + receive the daily brief from the
  # Telegram app. Long-polling (dials out to Telegram), so no inbound port is
  # needed; the only exposed port is the local healthcheck. Chat answers come
  # from research-qa and the daily brief from personalizer (both above).
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    environment:
      # Token from @BotFather — set in .env (no default → bot idles until set).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Comma-separated chat ids allowed to use the bot + receive the brief.
      # Empty → the bot replies with your chat id so you can bootstrap it.
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_BRIEFING_ENABLED: ${TELEGRAM_BRIEFING_ENABLED:-true}
      TELEGRAM_BRIEFING_HOUR: ${TELEGRAM_BRIEFING_HOUR:-13}
      TELEGRAM_BRIEFING_MINUTE: ${TELEGRAM_BRIEFING_MINUTE:-0}
      TELEGRAM_TZ: ${TELEGRAM_TZ:-UTC}
      MESH_TELEGRAM_API_URL: "http://api:8000"
      MESH_TELEGRAM_FIELD: ${MESH_TELEGRAM_FIELD:-ai-robotics}
      # Optional: when set, brief items link to the wiki detail pages.
      MESH_TELEGRAM_WIKI_URL: ${MESH_TELEGRAM_WIKI_URL:-}
      HEALTH_HOST: "0.0.0.0"
      HEALTH_PORT: "9110"
    env_file:
      - .env
    ports:
      - "9110:9110"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9110/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mesh_pg_data:
    driver: local
