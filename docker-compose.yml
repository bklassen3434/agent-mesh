      MESH_BLUESKY_HANDLES: ${MESH_BLUESKY_HANDLES:-}
    env_file:
      - .env
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  reddit-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.reddit_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8010"
      AGENT_PUBLIC_URL: "http://reddit-scout:8010"
      MESH_REDDIT_SUBS: ${MESH_REDDIT_SUBS:-MachineLearning,LocalLLaMA,singularity,artificial}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
    env_file:
      - .env
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  blog-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.blog_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8011"
      AGENT_PUBLIC_URL: "http://blog-scout:8011"
      MESH_BLOG_FEEDS: ${MESH_BLOG_FEEDS:-}
      MESH_BLOG_FEEDS_FILE: ${MESH_BLOG_FEEDS_FILE:-/app/config/blog_feeds.yaml}
      MESH_BLOG_LOOKBACK_HOURS: ${MESH_BLOG_LOOKBACK_HOURS:-24}
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  leaderboard-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.leaderboard_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8012"
      AGENT_PUBLIC_URL: "http://leaderboard-scout:8012"
    env_file:
      - .env
    ports:
      - "8012:8012"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Config-driven connectors (Phase 18a) ───────────────────────────────────
  # One service per kind; arbitrarily many instances are field_connectors rows.
  # Not enabled for ai-robotics — discoverable, dispatched only where enabled.
  web-search-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.web_search_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8017"
      AGENT_PUBLIC_URL: "http://web-search-scout:8017"
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    env_file:
      - .env
    ports:
      - "8017:8017"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8017/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rss-scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: ["uv", "run", "python", "-m", "mesh_agent_servers.rss_scout"]
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8014"
      AGENT_PUBLIC_URL: "http://rss-scout:8014"
    env_file:
      - .env
    ports:
      - "8014:8014"
    healthcheck:
