[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mesh-llm"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "ollama>=0.3",
    "anthropic>=0.40",
    "httpx>=0.27",
    "tenacity>=8.2",
    "pydantic>=2.0",
    "fastembed>=0.4",
    "mesh-tracing",
]

[tool.uv.sources]
mesh-tracing = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mesh_llm"]
