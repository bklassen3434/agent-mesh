[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mesh-agents"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "arxiv>=2.1",
    "httpx>=0.27",
    "starlette",
    "uvicorn",
    "mesh-models",
    "mesh-llm",
    "mesh-db",
    "mesh-a2a",
]

[tool.uv.sources]
mesh-models = { workspace = true }
mesh-llm = { workspace = true }
mesh-db = { workspace = true }
mesh-a2a = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mesh_agents"]
