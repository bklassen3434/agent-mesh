[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mesh-a2a"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "a2a-sdk[http-server]>=1.0.0",
    "httpx>=0.27",
    "pydantic>=2.0",
    "starlette",
    "uvicorn",
    "langchain-core>=0.3",
    "langgraph-checkpoint>=2.0",
    "langgraph-checkpoint-postgres>=2.0",
    "psycopg[binary]>=3.1",
    "mesh-models",
    "mesh-tracing",
]

[tool.uv.sources]
mesh-models = { workspace = true }
mesh-tracing = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mesh_a2a"]
