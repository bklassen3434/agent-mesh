# docker-compose.pi.yml — Raspberry Pi 5 (4 GB) accommodation overlay.
#
# NOT auto-merged. Opt in on the Pi only, either by passing it explicitly:
#     docker compose -f docker-compose.yml -f docker-compose.pi.yml up -d
# or (recommended) by setting in the Pi's .env:
#     COMPOSE_FILE=docker-compose.yml:docker-compose.pi.yml
# so every `docker compose` / `make` command picks it up automatically.
# Your laptop never sets COMPOSE_FILE, so its behaviour is unchanged.
#
# The orphaned A2A agent stack and the legacy scheduler are gone from the base
# file, so this overlay no longer parks anything in profiles. The whole project
# — controller, api, wiki, research-qa, personalizer, telegram-bot — runs
# default-on; on a 4 GB Pi back it with an SSD + ~8 GB swap (see docs/raspberry-pi.md).
#
# What it does:
#   * Tunes Postgres for low RAM.
#   * Relocates the Postgres data volume to an SSD bind mount (/mnt/ssd).
#   * Lengthens healthcheck start_periods. On the Pi's arm64 CPU a container
#     runs `uv sync` and imports heavy ML deps (fastembed/onnxruntime) before
#     binding its port — ~3 min cold. The base 15–30s start_period is fine on a
#     laptop but trips on the Pi, so `docker compose up --build` aborts on a
#     `depends_on: service_healthy` gate and reports failure even though the
#     stack goes healthy a couple minutes later. 180s absorbs the slow first boot.

# Anchor: every service with a healthcheck merges this (compose deep-merges the
# healthcheck mapping, so only start_period is overridden — test/interval/
# timeout/retries are inherited from docker-compose.yml).
x-pi-slow-start: &pi-slow-start
  healthcheck:
    start_period: 180s

services:
  api:           *pi-slow-start
  wiki:          *pi-slow-start
  research-qa:   *pi-slow-start
  personalizer:  *pi-slow-start
  telegram-bot:  *pi-slow-start

  # ── Postgres: low-RAM tuning + SSD-backed data dir ─────────────────────────
  mesh-postgres:
    command:
      - postgres
      - -c
      - max_connections=50
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB

# Bind the named Postgres volume to a directory on the SSD. Postgres on the
# microSD card is slow and wears the card out under a 24/7 write workload.
volumes:
  mesh_pg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/ssd/mesh_pg_data
